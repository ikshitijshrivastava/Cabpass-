<!DOCTYPE html>
<html>
<head><title>Generate CabPass Icons</title></head>
<body style="font-family:sans-serif;padding:20px;background:#0f1923;color:#e8edf2;">
<h2>CabPass Icon Generator</h2>
<p>Click the buttons below to download the icons, then place them in an <b>icons/</b> folder in your GitHub repo.</p>
<canvas id="c192" width="192" height="192" style="display:none"></canvas>
<canvas id="c512" width="512" height="512" style="display:none"></canvas>
<br>
<button onclick="generate(192)" style="padding:12px 20px;margin:8px;background:#f5a623;border:none;border-radius:8px;font-weight:700;cursor:pointer;">Download icon-192.png</button>
<button onclick="generate(512)" style="padding:12px 20px;margin:8px;background:#f5a623;border:none;border-radius:8px;font-weight:700;cursor:pointer;">Download icon-512.png</button>

<script>
function generate(size) {
  const canvas = document.getElementById('c'+size);
  const ctx = canvas.getContext('2d');
  const r = size * 0.2;
  
  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#f5a623');
  grad.addColorStop(1, '#e8541e');
  
  // Rounded rect background
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size-r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size-r);
  ctx.quadraticCurveTo(size, size, size-r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size-r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();
  
  // Emoji taxi
  ctx.font = `${size*0.5}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🚖', size/2, size/2);
  
  // Download
  const a = document.createElement('a');
  a.download = `icon-${size}.png`;
  a.href = canvas.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
